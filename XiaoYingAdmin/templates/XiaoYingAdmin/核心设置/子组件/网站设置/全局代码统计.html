{% load static %}

{# 全局代码统计设置组件 #}
<div class="site-section">
    <div class="site-section-header">
        <h3>全局代码统计</h3>
        <span class="section-desc">用于存放全局统计代码、第三方分析脚本等内容，会在全站页面底部引入</span>
    </div>
    <div class="site-section-body">
        {% if saved %}
        <div class="layui-alert layui-alert-success" style="margin-bottom:15px;">
            <i class="fas fa-check-circle"></i> 配置已保存
        </div>
        {% endif %}
        <form id="codeStatisticsForm" class="layui-form" method="post" action="">
            {% csrf_token %}
            <div class="layui-form-item">
                <div class="layui-input-block site-switch-row">
                    <input type="checkbox" name="is_active" lay-skin="switch" lay-text="启用|关闭" lay-filter="isActiveSwitch" {% if site_settings.is_active %}checked{% endif %}>
                    <span class="site-switch-desc"><i class="fas fa-info-circle"></i> 关闭后统计代码将不会在页面中输出</span>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">统计代码</label>
                <div class="layui-input-block">
                    <textarea name="statistics_code"
                              class="layui-textarea"
                              style="min-height:200px; font-family: Consolas, monospace;"
                              placeholder="请输入全局统计代码，支持 JavaScript、HTML 等多种代码格式&#10;&#10;示例：&#10;&lt;script&gt;&#10;  var _hmt = _hmt || [];&#10;  (function() {&#10;    var hm = document.createElement('script');&#10;    hm.src = 'https://hm.baidu.com/hm.js?xxx';&#10;    var s = document.getElementsByTagName('script')[0];&#10;    s.parentNode.insertBefore(hm, s);&#10;  })();&#10;&lt;/script&gt;">{{ site_settings.statistics_code }}</textarea>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit lay-filter="codeStatsSubmit">保存配置</button>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
    .site-section {
        background: #fff;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
    }
    .site-section-header {
        padding: 15px 20px;
        border-bottom: 1px solid #e6e6e6;
        display: flex;
        align-items: baseline;
        gap: 15px;
    }
    .site-section-header h3 {
        margin: 0;
        font-size: 16px;
        color: #393D49;
    }
    .section-desc {
        font-size: 12px;
        color: #999;
    }
    .site-section-body {
        padding: 20px;
    }
    .site-switch-row {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .site-switch-desc {
        font-size: 13px;
        color: #666;
        line-height: 1;
    }
    .site-switch-desc .fas {
        color: #1E9FFF;
        margin-right: 4px;
    }
</style>

<script>
layui.use(['form'], function() {
    var form = layui.form;
    // 关键：渲染 lay-skin="switch" 等自定义外观的表单元素
    form.render();

    form.on('submit(codeStatsSubmit)', function(data) {
        // 表单通过 POST 提交到后端，由视图处理
        return true;
    });
});
</script>
