{# 蜘蛛日志 — 统计概览（4 卡片）#}
<div class="layui-row layui-col-space15" style="margin-bottom:15px;">
    <div class="layui-col-md3">
        <div class="layui-card" style="margin-bottom:0;">
            <div class="layui-card-body" style="padding: 20px;">
                <div style="font-size:12px; color:#999; margin-bottom:5px;">
                    <i class="fas fa-spider" style="color:#FF7676;"></i> 今日爬虫数
                </div>
                <div style="font-size:28px; font-weight:bold; color:#FF7676;">
                    {{ stats.spider_count }}
                </div>
                <div style="font-size:12px; color:#999; margin-top:5px;">种不同爬虫</div>
            </div>
        </div>
    </div>

    <div class="layui-col-md3">
        <div class="layui-card" style="margin-bottom:0;">
            <div class="layui-card-body" style="padding: 20px;">
                <div style="font-size:12px; color:#999; margin-bottom:5px;">
                    <i class="fas fa-network-wired" style="color:#5FB878;"></i> 今日 IP 数
                </div>
                <div style="font-size:28px; font-weight:bold; color:#5FB878;">
                    {{ stats.ip_count }}
                </div>
                <div style="font-size:12px; color:#999; margin-top:5px;">个独立访客</div>
            </div>
        </div>
    </div>

    <div class="layui-col-md3">
        <div class="layui-card" style="margin-bottom:0;">
            <div class="layui-card-body" style="padding: 20px;">
                <div style="font-size:12px; color:#999; margin-bottom:5px;">
                    <i class="fas fa-route" style="color:#1E9FFF;"></i> 今日路径数
                </div>
                <div style="font-size:28px; font-weight:bold; color:#1E9FFF;">
                    {{ stats.path_count }}
                </div>
                <div style="font-size:12px; color:#999; margin-top:5px;">条不同路径</div>
            </div>
        </div>
    </div>

    <div class="layui-col-md3">
        <div class="layui-card" style="margin-bottom:0;">
            <div class="layui-card-body" style="padding: 20px;">
                <div style="font-size:12px; color:#999; margin-bottom:5px;">
                    <i class="fas fa-chart-line" style="color:#FFB800;"></i> 今日总请求
                </div>
                <div style="font-size:28px; font-weight:bold; color:#FFB800;">
                    {{ stats.total_count }}
                </div>
                <div style="font-size:12px; color:#999; margin-top:5px;">次访问</div>
            </div>
        </div>
    </div>
</div>
