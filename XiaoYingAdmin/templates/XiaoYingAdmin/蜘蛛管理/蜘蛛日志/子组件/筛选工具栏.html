{# 蜘蛛日志 — 筛选工具栏（GET form）#}
<form method="get" action="" class="layui-form" id="spider-log-filter-form" style="margin-bottom:15px;">
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">

        <span style="color:#666;"><i class="fas fa-filter"></i> 筛选：</span>

        {# ===== 时间段 ===== #}
        <select name="days" lay-ignore style="width:120px;">
            <option value="today" {% if days == 'today' %}selected{% endif %}>仅今天</option>
            <option value="1d"    {% if days == '1d' %}selected{% endif %}>近 1 天</option>
            <option value="3d"    {% if days == '3d' %}selected{% endif %}>近 3 天</option>
            <option value="7d"    {% if days == '7d' or not days %}selected{% endif %}>近 7 天</option>
            <option value="30d"   {% if days == '30d' %}selected{% endif %}>近 30 天</option>
            <option value="all"   {% if days == 'all' %}selected{% endif %}>全部</option>
        </select>

        {# ===== 访问者类型（蜘蛛/真人/直接访问） ===== #}
        <select name="who" lay-ignore style="width:130px;">
            <option value=""        {% if not current_who %}selected{% endif %}>所有访问者</option>
            <option value="spider"  {% if current_who == 'spider'  %}selected{% endif %}>🕷 仅蜘蛛</option>
            <option value="human"   {% if current_who == 'human'   %}selected{% endif %}>👤 仅真人</option>
            <option value="direct"  {% if current_who == 'direct'  %}selected{% endif %}>🔗 仅直接访问</option>
        </select>

        {# ===== 爬虫名（仅在访问者=蜘蛛/全部时有意义） ===== #}
        <select name="spider" lay-ignore style="width:160px;">
            <option value="">所有爬虫</option>
            {% for s in all_spider_names %}
                <option value="{{ s }}" {% if current_spider == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>

        <input type="text" name="ip" value="{{ current_ip }}" placeholder="按 IP 过滤" class="layui-input" style="width:160px;">

        <select name="method" lay-ignore style="width:100px;">
            <option value="">所有方法</option>
            <option value="GET"    {% if current_method == 'GET' %}selected{% endif %}>GET</option>
            <option value="POST"   {% if current_method == 'POST' %}selected{% endif %}>POST</option>
            <option value="HEAD"   {% if current_method == 'HEAD' %}selected{% endif %}>HEAD</option>
        </select>

        <button type="submit" class="layui-btn layui-btn-sm">
            <i class="fas fa-search"></i> 应用
        </button>

        <label style="cursor:pointer;display:flex;align-items:center;gap:4px;font-size:13px;color:#666;user-select:none;">
            <input type="checkbox" name="hide_blocked" value="1"
                onchange="this.form.submit();"
                {% if hide_blocked %}checked{% endif %}
                style="width:15px;height:15px;cursor:pointer;">
            <i class="fas fa-shield-alt" style="color:#e74c3c;font-size:12px;"></i> 排除已封禁
        </label>

        <a href="{% url 'spider_logs' %}" class="layui-btn layui-btn-sm layui-btn-primary">
            <i class="fas fa-undo"></i> 重置
        </a>

        <span style="flex:1;"></span>

        {# ===== 每页条数（自定义分页大小,改变即自动提交） ===== #}
        <span style="color:#666;"><i class="fas fa-list-ol"></i> 每页</span>
        <select name="page_size" lay-ignore id="spider-log-page-size" style="width:80px;"
                onchange="document.getElementById('spider-log-filter-form').submit();">
            {% for n in allowed_page_sizes %}
                <option value="{{ n }}" {% if page_size == n %}selected{% endif %}>{{ n }}</option>
            {% endfor %}
        </select>
        <span style="color:#666;">条</span>

        <a href="{% url 'spider_logs_api_export' %}?days={{ days }}{% if current_who %}&who={{ current_who }}{% endif %}{% if current_spider %}&spider={{ current_spider }}{% endif %}{% if current_ip %}&ip={{ current_ip }}{% endif %}{% if current_method %}&method={{ current_method }}{% endif %}"
           class="layui-btn layui-btn-sm layui-btn-warm">
            <i class="fas fa-file-csv"></i> 导出 CSV
        </a>

        <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" onclick="clearAllLogs()">
            <i class="fas fa-trash"></i> 清空全部
        </button>

    </div>
</form>

<style>
/* ===== 筛选工具栏 原生 select 样式（被 lay-ignore 跳过的需要手动美化） ===== */
#spider-log-filter-form select {
    height: 38px;
    padding: 0 10px;
    border: 1px solid #e6e6e6;
    border-radius: 2px;
    background-color: #fff;
    color: #393D49;
    font-size: 14px;
    line-height: 1.3;
    cursor: pointer;
    transition: border-color 0.2s;
}
#spider-log-filter-form select:hover {
    border-color: #1E9FFF;
}
#spider-log-filter-form select:focus {
    border-color: #1E9FFF;
    outline: none;
}
</style>
