{% extends 'XiaoYingAdmin/template.html' %}
{% block title %}创建多页面项目{% endblock %}
{% block head %}
<style>
    .mp-form-wrap { max-width:720px; margin:0 auto; background:#fff; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,.06); padding:30px 36px; }
    .mp-form-wrap h2 { font-size:18px; color:#393D49; margin-bottom:24px; }
    .mp-form-wrap h2 i { color:#1E9FFF; margin-right:8px; }
    .form-tip { font-size:12px; color:#999; margin-top:4px; }
    .form-tip i { margin-right:3px; }
    .layui-form-label { width:120px; }
    .layui-input-block { margin-left:150px; }
    .style-options { display:flex; gap:12px; flex-wrap:wrap; }
    .style-option { cursor:pointer; padding:8px 16px; border:2px solid #e6e6e6; border-radius:6px; text-align:center; transition:all .2s; font-size:13px; min-width:80px; }
    .style-option:hover { border-color:#1E9FFF; }
    .style-option.selected { border-color:#1E9FFF; background:#f0f7ff; }
    .style-option i { display:block; font-size:24px; margin-bottom:4px; color:#666; }
    .style-option.selected i { color:#1E9FFF; }
    .style-option.selected span { color:#1E9FFF; font-weight:600; }
</style>
{% endblock %}
{% block body %}
<div class="mp-form-wrap">
    <h2><i class="fas fa-plus-circle"></i>创建多页面项目</h2>

    <form class="layui-form" method="post">
        {% csrf_token %}

        <div class="layui-form-item">
            <label class="layui-form-label">项目名称</label>
            <div class="layui-input-block">
                <input type="text" name="name" class="layui-input" placeholder="留空则自动取主题描述前50字">
                <div class="form-tip"><i class="fas fa-info-circle"></i>用于内部识别，可以不填</div>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">根域名</label>
            <div class="layui-input-block">
                <input type="text" name="root_domain" class="layui-input" placeholder="例如：example.com" required>
                <div class="form-tip"><i class="fas fa-globe"></i>每个页面会自动拼接完整 URL（https://根域名/路径）</div>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">主题描述</label>
            <div class="layui-input-block">
                <textarea name="theme" class="layui-textarea" placeholder="请详细描述你的产品/服务/网站主题，越详细 AI 生成效果越好&#10;&#10;例如：&#10;- 产品名称、核心功能、目标用户&#10;- 希望传达的品牌印象&#10;- 需要包含哪些内容板块&#10;- 是否有参考风格" style="min-height:140px;" required></textarea>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">风格偏好</label>
            <div class="layui-input-block">
                <div class="style-options" id="styleOptions">
                    <div class="style-option selected" data-value="modern">
                        <i class="fas fa-paint-brush"></i>
                        <span>现代简约</span>
                    </div>
                    <div class="style-option" data-value="tech">
                        <i class="fas fa-microchip"></i>
                        <span>科技感</span>
                    </div>
                    <div class="style-option" data-value="corporate">
                        <i class="fas fa-building"></i>
                        <span>企业商务</span>
                    </div>
                    <div class="style-option" data-value="creative">
                        <i class="fas fa-palette"></i>
                        <span>创意设计</span>
                    </div>
                    <div class="style-option" data-value="minimal">
                        <i class="fas fa-minus"></i>
                        <span>极简</span>
                    </div>
                </div>
                <input type="hidden" name="style" id="styleInput" value="modern">
            </div>
        </div>

        <div class="layui-form-item">
            <div class="layui-input-block" style="margin-left:150px;">
                <button class="layui-btn" lay-submit style="padding:0 36px;font-size:15px;">
                    <i class="fas fa-rocket"></i> 创建并开始生成
                </button>
                <a href="{% url 'multi_page_list' %}" class="layui-btn layui-btn-primary">返回列表</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
{% block js %}
<script>
// 风格选择
document.getElementById('styleOptions').addEventListener('click', function(e) {
    var opt = e.target.closest('.style-option');
    if (!opt) return;
    this.querySelectorAll('.style-option').forEach(function(o) { o.classList.remove('selected'); });
    opt.classList.add('selected');
    document.getElementById('styleInput').value = opt.getAttribute('data-value');
});
</script>
{% endblock %}
