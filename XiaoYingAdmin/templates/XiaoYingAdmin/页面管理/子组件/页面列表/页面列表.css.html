<style>

/* ========== 域名查看弹窗 ========== */

.domain-view-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding:0 8px; }

/* ========== 智能互链选择弹窗 ========== */
.cl-modal-body { padding:4px 2px; }

.cl-search-input:focus { border-color:#5FB878; background-color:#fff; box-shadow:0 0 0 3px rgba(95,184,120,.12); }

.bi-result-item .bi-ri-file { color:#999; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:0 8px; }
.bi-result-item .bi-ri-status { flex-shrink:0; font-size:11px; }

}

 </style>
