<script>
// ============================================================
// 页面列表 — 工具栏事件 & 初始化
// ============================================================

// ========== 工具栏 & 搜索 ==========

document.getElementById('btnSearch').addEventListener('click', function() {
    // 树形视图中搜索会重载树形数据
    loadTree();
});
document.getElementById('btnReset').addEventListener('click', function() {
    document.getElementById('searchKeyword').value = '';
    loadTree();
});
document.getElementById('searchKeyword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        loadTree();
    }
});

// ========== 新增页面 ==========

document.getElementById('btnCreatePage').addEventListener('click', function() {
    openCreatePage();
});

// ========== 批量导入 ==========

document.getElementById('btnBatchImport').addEventListener('click', function() {
    openBatchImportModal();
});

// ========== 初始化：加载分类 & 树形数据 ==========

document.addEventListener('DOMContentLoaded', function() {
    loadCategories().then(function() {
        loadTree();
    });
});
</script>
