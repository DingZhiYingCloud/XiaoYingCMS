<script>
// ============================================================
// 页面列表 — 表格视图 & 交互
// ============================================================

// ========== 视图切换 ==========
document.querySelectorAll('.page-view-tabs .tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.page-view-tabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var view = btn.getAttribute('data-view');
        if (view === 'tree') {
            document.getElementById('treeView').classList.add('active');
            document.getElementById('tableView').classList.remove('active');
            document.getElementById('sidebarWrap').style.display = '';
        } else {
            document.getElementById('treeView').classList.remove('active');
            document.getElementById('tableView').classList.add('active');
            document.getElementById('sidebarWrap').style.display = 'none';
            loadTableView(1);
        }
    });
});

// ========== 表格视图（原有逻辑） ==========

function loadTableView(page) {
    page = page || 1;
    currentPageTV = page;
    var keyword = searchInput.value.trim();
    var url = '/xiaoying_admin/api/pages/saved/?page=' + page + '&limit=' + pageSize;
    if (keyword) url += '&keyword=' + encodeURIComponent(keyword);

    tbody.innerHTML = '<tr><td colspan="8" class="loading-mask">加载中...</td></tr>';

    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(resp) {
            totalCount = resp.total || 0;
            totalLabel.textContent = '共 ' + totalCount + ' 条';
            var items = resp.items || [];
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="loading-mask">暂无数据</td></tr>';
                pagWrap.innerHTML = '';
                return;
            }
            var html = '';
            for (var i = 0; i < items.length; i++) {
                var p = items[i];
                html += '<tr data-id="' + p.id + '">';
                html += '<td>' + p.id + '</td>';
                html += '<td class="page-name">' + escHtml(p.name) + '</td>';
                html += '<td class="page-input" title="' + escAttr(p.input_content || '') + '">' + escHtml(p.input_content || '') + '</td>';
                html += '<td style="color:#999;font-size:12px;">' + (p.created_by || '<span style="color:#ccc;">-</span>') + '</td>';
                html += '<td>';
                var domains = p.domains && p.domains.length ? p.domains : (p.domain ? [p.domain] : []);
                if (domains.length) {
                    html += domains.map(function(d) {
                        var cls = d.indexOf('*.') === 0 ? 'domain-wildcard' : 'domain-badge';
                        return '<span class="' + cls + '">' + escHtml(d) + '</span>';
                    }).join(' ');
                } else {
                    html += '<span class="domain-empty">未设置</span>';
                }
                html += '</td>';
                html += '<td>' + (p.create_time || '') + '</td>';
                var onIcon = p.crosslink_excluded ? 'fa-toggle-on' : 'fa-toggle-off';
                var onColor = p.crosslink_excluded ? '#5FB878' : '#ccc';
                html += '<td style="text-align:center;"><i class="fas ' + onIcon + ' crosslink-toggle" data-id="' + p.id + '" data-excluded="' + (p.crosslink_excluded ? '1' : '0') + '" style="color:' + onColor + ';cursor:pointer;font-size:20px;transition:color .2s;"></i></td>';
                html += '<td style="text-align:center;">';
                html += '<div class="action-dropdown">';
                html += '<button class="layui-btn layui-btn-sm layui-btn-primary dropdown-trigger" style="font-size:16px;padding:0 10px;line-height:30px;height:30px;"><i class="fas fa-caret-down"></i></button>';
                html += '<div class="dropdown-menu">';
                html += '<a href="javascript:;" class="dropdown-item btn-edit-page-tbl" data-id="' + p.id + '"><i class="fas fa-edit"></i> 编辑</a>';
                html += '<a href="javascript:;" class="dropdown-item btn-seo-page-tbl" data-id="' + p.id + '"><i class="fas fa-search"></i> SEO优化</a>';
                html += '<a href="javascript:;" class="dropdown-item btn-cat-page-tbl" data-id="' + p.id + '"><i class="fas fa-tags"></i> 分类设置</a>';
                html += '<a href="javascript:;" class="dropdown-item btn-domain-tbl" data-id="' + p.id + '" data-domains=\'' + escAttr(JSON.stringify(domains)) + '\'><i class="fas fa-globe"></i> 域名设置</a>';
                html += '<a href="javascript:;" class="dropdown-item btn-view-tbl" data-id="' + p.id + '" data-domains=\'' + escAttr(JSON.stringify(domains)) + '\'><i class="fas fa-external-link-alt"></i> 打开</a>';
                html += '<div class="dropdown-divider"></div>';
                html += '<a href="javascript:;" class="dropdown-item btn-del-page-tbl dropdown-danger" data-id="' + p.id + '"><i class="fas fa-trash"></i> 删除</a>';
                html += '</div></div>';
                html += '</td>';
                html += '</tr>';
            }
            tbody.innerHTML = html;
            renderPaginationTV();
        })
        .catch(function() {
            tbody.innerHTML = '<tr><td colspan="8" class="loading-mask" style="color:#FF5722;">加载失败</td></tr>';
        });
}

function renderPaginationTV() {
    var totalPages = Math.ceil(totalCount / pageSize) || 1;
    if (totalCount === 0) { pagWrap.innerHTML = ''; return; }
    var html = '', i, active;

    var prevClass = currentPageTV <= 1 ? 'disabled' : '';
    html += '<span class="page-btn ' + prevClass + '" data-page="' + (currentPageTV - 1) + '">‹</span>';

    var start = Math.max(1, currentPageTV - 2);
    var end = Math.min(totalPages, currentPageTV + 2);
    if (start > 1) html += '<span class="page-btn" data-page="1">1</span>';
    if (start > 2) html += '<span class="page-btn disabled">...</span>';
    for (i = start; i <= end; i++) {
        active = i === currentPageTV ? 'active' : '';
        html += '<span class="page-btn ' + active + '" data-page="' + i + '">' + i + '</span>';
    }
    if (end < totalPages - 1) html += '<span class="page-btn disabled">...</span>';
    if (end < totalPages) html += '<span class="page-btn" data-page="' + totalPages + '">' + totalPages + '</span>';

    var nextClass = currentPageTV >= totalPages ? 'disabled' : '';
    html += '<span class="page-btn ' + nextClass + '" data-page="' + (currentPageTV + 1) + '">›</span>';
    html += '<span class="page-info">第 ' + currentPageTV + '/' + totalPages + ' 页</span>';

    pagWrap.innerHTML = html;
}

// 表格翻页
pagWrap.addEventListener('click', function(e) {
    var btn = e.target.closest('.page-btn');
    if (!btn || btn.classList.contains('disabled')) return;
    var p = parseInt(btn.getAttribute('data-page'));
    if (p < 1 || p > Math.ceil(totalCount / pageSize) || p === currentPageTV) return;
    loadTableView(p);
});

// ========== 表格视图操作 ==========

tbody.addEventListener('click', function(e) {
    var btn;

    btn = e.target.closest('.btn-view-tbl');
    if (btn) {
        openPage(btn);
        return;
    }

    btn = e.target.closest('.btn-domain-tbl');
    if (btn) {
        var id = parseInt(btn.getAttribute('data-id'));
        var domainsStr = btn.getAttribute('data-domains') || '[]';
        try { openDomainEditor(id, JSON.parse(domainsStr)); }
        catch(e) { openDomainEditor(id, []); }
        return;
    }

    btn = e.target.closest('.btn-edit-page-tbl');
    if (btn) {
        openEditor(parseInt(btn.getAttribute('data-id')));
        return;
    }

    btn = e.target.closest('.btn-seo-page-tbl');
    if (btn) {
        seoOptimizePage(parseInt(btn.getAttribute('data-id')));
        return;
    }

    btn = e.target.closest('.btn-cat-page-tbl');
    if (btn) {
        openPageCategoryEditor(parseInt(btn.getAttribute('data-id')));
        return;
    }

    btn = e.target.closest('.btn-del-page-tbl');
    if (btn) {
        deletePage(parseInt(btn.getAttribute('data-id')));
        return;
    }
});

// 表格视图：下拉菜单
tbody.addEventListener('click', function(e) {
    var trigger = e.target.closest('.dropdown-trigger');
    if (trigger) {
        e.stopPropagation();
        var dropdown = trigger.closest('.action-dropdown');
        document.querySelectorAll('.action-dropdown.open').forEach(function(d) {
            if (d !== dropdown) d.classList.remove('open');
        });
        dropdown.classList.toggle('open');
    }
});
document.addEventListener('click', function() {
    document.querySelectorAll('.action-dropdown.open').forEach(function(d) {
        d.classList.remove('open');
    });
});

// 排除互链开关图标
tbody.addEventListener('click', function(e) {
    var icon = e.target.closest('.crosslink-toggle');
    if (!icon) return;
    var id = parseInt(icon.getAttribute('data-id'));
    var currentlyExcluded = icon.getAttribute('data-excluded') === '1';
    var newExcluded = !currentlyExcluded;

    // 立即切换 UI（乐观更新）
    if (newExcluded) {
        icon.className = 'fas fa-toggle-on crosslink-toggle';
        icon.style.color = '#5FB878';
        icon.setAttribute('data-excluded', '1');
    } else {
        icon.className = 'fas fa-toggle-off crosslink-toggle';
        icon.style.color = '#ccc';
        icon.setAttribute('data-excluded', '0');
    }

    fetch('/xiaoying_admin/api/crosslinks/exclude-toggle/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, excluded: newExcluded }),
    }).then(function(r) { return r.json(); }).then(function(resp) {
        if (resp.error) {
            layer.msg(resp.error, {icon:2});
            // 回滚
            if (currentlyExcluded) {
                icon.className = 'fas fa-toggle-on crosslink-toggle';
                icon.style.color = '#5FB878';
                icon.setAttribute('data-excluded', '1');
            } else {
                icon.className = 'fas fa-toggle-off crosslink-toggle';
                icon.style.color = '#ccc';
                icon.setAttribute('data-excluded', '0');
            }
            return;
        }
        layer.msg(resp.message || (newExcluded ? '已排除互链' : '已纳入互链'), {icon:1, time:1000});
    }).catch(function() {
        layer.msg('操作失败', {icon:2});
        // 回滚
        if (currentlyExcluded) {
            icon.className = 'fas fa-toggle-on crosslink-toggle';
            icon.style.color = '#5FB878';
            icon.setAttribute('data-excluded', '1');
        } else {
            icon.className = 'fas fa-toggle-off crosslink-toggle';
            icon.style.color = '#ccc';
            icon.setAttribute('data-excluded', '0');
        }
    });
});
</script>
