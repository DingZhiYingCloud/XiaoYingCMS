{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 — {{ site_name }}</title>
    <link rel="stylesheet" href="{% static 'vendor/layui/css/layui.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.03) 0%, transparent 60%),
                        radial-gradient(circle at 70% 60%, rgba(100,180,255,0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        .fp-container {
            width: 420px;
            max-width: 92vw;
            position: relative;
            z-index: 1;
        }
        .fp-brand {
            text-align: center;
            margin-bottom: 24px;
        }
        .fp-brand .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #5FB878, #3A9E6D);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
            box-shadow: 0 8px 24px rgba(95, 184, 120, 0.3);
        }
        .fp-brand h1 { color: #fff; font-size: 20px; font-weight: 600; }
        .fp-brand p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
        .fp-card {
            background: #fff;
            border-radius: 12px;
            padding: 32px 28px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .fp-card h2 {
            font-size: 16px;
            color: #393D49;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .fp-card h2 i { margin-right: 6px; color: #5FB878; }

        .fp-field {
            position: relative;
            margin-bottom: 16px;
        }
        .fp-field .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
            font-size: 14px;
            z-index: 2;
            transition: color 0.2s;
        }
        .fp-field .field-icon.active { color: #5FB878; }
        .fp-field input {
            width: 100%;
            height: 42px;
            padding: 0 14px 0 40px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            font-size: 14px;
            color: #393D49;
            background: #fafafa;
            outline: none;
            transition: all 0.25s;
        }
        .fp-field input:focus {
            border-color: #5FB878;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(95, 184, 120, 0.12);
        }
        .fp-field input::placeholder { color: #bbb; }
        .fp-hint { font-size: 12px; color: #999; margin-top: 4px; padding-left: 4px; }

        .fp-error {
            background: #fff5f5;
            border: 1px solid #ffe0e0;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: #e54d4d;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fp-success {
            background: #f0fff4;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 16px;
            color: #2d6a4f;
            font-size: 13px;
            text-align: center;
        }
        .fp-success i { font-size: 28px; display: block; margin-bottom: 8px; color: #5FB878; }

        .fp-btn {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #5FB878, #3A9E6D);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 14px rgba(95, 184, 120, 0.35);
        }
        .fp-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(95, 184, 120, 0.45); }
        .fp-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .fp-btn.loading { pointer-events: none; position: relative; }
        .fp-btn.loading::after {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            right: 24px;
            top: 50%;
            margin-top: -9px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .fp-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }
        .fp-footer a { color: #5FB878; text-decoration: none; }
        .fp-footer a:hover { text-decoration: underline; }
        .fp-footer-bottom {
            text-align: center;
            margin-top: 18px;
            color: rgba(255,255,255,0.35);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="fp-container">
        <div class="fp-brand">
            <div class="brand-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>{{ site_name }}</h1>
            <p>重置后台密码</p>
        </div>

        <div class="fp-card">
            <h2><i class="fas fa-unlock-alt"></i> 忘记密码</h2>

            {% if error %}
            <div class="fp-error">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            {% if success %}
            <div class="fp-success">
                <i class="fas fa-check-circle"></i>
                <p>{{ success }}</p>
                <div style="margin-top:14px;">
                    <a href="{% url 'login' %}" class="fp-btn" style="display:inline-block;width:auto;padding:0 28px;line-height:40px;text-decoration:none;font-size:14px;">
                        <i class="fas fa-sign-in-alt"></i> 前往登录
                    </a>
                </div>
            </div>
            {% endif %}

            {% if not success %}
            <form method="post" id="fp-form" autocomplete="off">
                {% csrf_token %}

                <div class="fp-field">
                    <i class="fas fa-user field-icon" id="icon-user"></i>
                    <input type="text" name="username" id="username"
                           placeholder="用户名" required autofocus>
                </div>

                <div class="fp-field">
                    <i class="fas fa-envelope field-icon" id="icon-email"></i>
                    <input type="email" name="email" id="email"
                           placeholder="注册时填写的邮箱" required>
                </div>

                <div class="fp-field">
                    <i class="fas fa-lock field-icon" id="icon-pass"></i>
                    <input type="password" name="password" id="password"
                           placeholder="新密码（至少 6 位）" required>
                </div>

                <div class="fp-field">
                    <i class="fas fa-check-circle field-icon" id="icon-pass2"></i>
                    <input type="password" name="password2" id="password2"
                           placeholder="确认新密码" required>
                </div>

                <div class="fp-hint">
                    <i class="fas fa-info-circle"></i>
                    需同时输入正确的用户名和注册邮箱才能重置密码
                </div>

                <button type="submit" class="fp-btn" id="fp-btn" style="margin-top:16px;">
                    <i class="fas fa-sync-alt"></i> 重置密码
                </button>
            </form>

            <div class="fp-footer">
                <a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> 返回登录</a>
                &nbsp;|&nbsp;
                <a href="{% url 'register' %}">注册新账号</a>
            </div>
            {% endif %}
        </div>

        <div class="fp-footer-bottom">
            &copy; {{ site_name }} &middot; {{ version }}
        </div>
    </div>

    <script src="{% static 'vendor/layui/layui.js' %}"></script>
    <script>
    (function () {
        var form = document.getElementById('fp-form');
        if (!form) return;
        var btn = document.getElementById('fp-btn');

        function toggleIcon(inputId, iconId) {
            var input = document.getElementById(inputId);
            var icon = document.getElementById(iconId);
            if (!input || !icon) return;
            input.addEventListener('focus', function () { icon.classList.add('active'); });
            input.addEventListener('blur', function () { icon.classList.remove('active'); });
        }
        toggleIcon('username', 'icon-user');
        toggleIcon('email', 'icon-email');
        toggleIcon('password', 'icon-pass');
        toggleIcon('password2', 'icon-pass2');

        form.addEventListener('submit', function () {
            btn.disabled = true;
            btn.classList.add('loading');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 重置中…';
        });
    })();
    </script>
</body>
</html>
