{% extends 'XiaoYingAdmin/template.html' %}
{% load static %}

{% block title %}债务管理 — {{ site_name }}{% endblock %}

{% block head %}
<style>
.debt-lend { color:#2ecc71; }
.debt-borrow { color:#e74c3c; }
.debt-tag {
  display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;
}
.debt-tag.lend { background:#e8f8f0;color:#27ae60;border:1px solid #a3e4c1; }
.debt-tag.borrow { background:#fde8e8;color:#c0392b;border:1px solid #f5b7b1; }
.status-badge {
  display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;
}
.status-badge.danger { background:#fde8e8;color:#c0392b; }
.status-badge.success { background:#e8f8f0;color:#27ae60; }
.status-badge.warn { background:#fef9e7;color:#d4a017; }
</style>
{% endblock %}

{% block body %}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
  <div>
    <i class="fas fa-hand-holding-usd" style="color:#e67e22;font-size:20px;"></i>
    <span style="font-size:16px;font-weight:600;color:#393D49;margin-left:6px;">债务管理</span>
    <span style="font-size:12px;color:#999;margin-left:8px;">
      共 <strong id="debtCount">0</strong> 条记录
    </span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <div style="position:relative;display:inline-flex;align-items:center;">
      <i class="fas fa-search" style="position:absolute;left:10px;color:#999;font-size:13px;pointer-events:none;"></i>
      <input type="text" id="debtSearchInput" placeholder="搜索对方姓名..." value=""
        style="height:30px;padding:0 10px 0 32px;border:1px solid #ddd;border-radius:15px;font-size:13px;outline:none;width:180px;transition:all 0.2s;"
        onfocus="this.style.borderColor='#e67e22';this.style.boxShadow='0 0 0 3px rgba(230,126,34,0.1)'"
        onblur="this.style.borderColor='#ddd';this.style.boxShadow='none'"
        onkeydown="if(event.key==='Enter'){currentDebtPage=1;loadList()}">
    </div>
    <div class="layui-btn-group">
      <button class="layui-btn layui-btn-sm" id="tabLend" onclick="switchTab('lend')">借出（别人欠我）</button>
      <button class="layui-btn layui-btn-sm layui-btn-primary" id="tabBorrow" onclick="switchTab('borrow')">借入（我欠别人）</button>
      <button class="layui-btn layui-btn-sm layui-btn-primary" id="tabAll" onclick="switchTab('all')">全部</button>
    </div>
    <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="showForm()">
      <i class="fas fa-plus"></i> 新增
    </button>
  </div>
</div>

{# 到期提醒区域 #}
<div id="reminderBar" style="display:none;margin-bottom:12px;"></div>

{# 列表 #}
<div class="layui-card">
  <div class="layui-card-body" style="padding:0;">
    <table class="layui-table" style="margin:0;font-size:13px;">
      <thead>
        <tr>
          <th style="width:70px;">方向</th>
          <th style="width:100px;">对方姓名</th>
          <th style="width:100px;">金额</th>
          <th style="width:100px;">借款日期</th>
          <th style="width:100px;">到期日期</th>
          <th style="width:90px;">状态</th>
          <th>备注</th>
          <th style="width:100px;">操作</th>
        </tr>
      </thead>
      <tbody id="debtTableBody">
        <tr id="emptyRow"><td colspan="8" style="text-align:center;padding:40px 0;color:#ccc;">
          <i class="fas fa-inbox" style="font-size:36px;display:block;margin-bottom:8px;"></i>
          暂无数据
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

{# ─── 分页 ─── #}
<div id="debtPaginationBar" style="margin-top:14px;text-align:center;"></div>
{% endblock %}

{% block js %}
<script>
let currentTab = 'lend';
let layer, form;
let currentDebtPage = 1;

layui.use(['layer', 'form'], function() {
  layer = layui.layer;
  form = layui.form;
  loadList();
  loadReminders();
});

function switchTab(tab) {
  currentTab = tab;
  currentDebtPage = 1;
  document.querySelectorAll('.layui-btn-group .layui-btn').forEach(function(b) {
    b.classList.add('layui-btn-primary');
  });
  if (tab === 'lend') document.getElementById('tabLend').classList.remove('layui-btn-primary');
  else if (tab === 'borrow') document.getElementById('tabBorrow').classList.remove('layui-btn-primary');
  else document.getElementById('tabAll').classList.remove('layui-btn-primary');
  loadList();
}

function loadList() {
  var searchVal = (document.getElementById('debtSearchInput').value || '').trim();
  var url = '/xiaoying_admin/api/finance/debt/list/?page=' + currentDebtPage + '&page_size=20';
  if (currentTab !== 'all') url += '&direction=' + currentTab;
  if (searchVal) url += '&search=' + encodeURIComponent(searchVal);

  fetch(url, {credentials: 'same-origin'})
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (!res.ok) return;
    var tbody = document.getElementById('debtTableBody');
    var html = '';
    res.list.forEach(function(d) {
      var directionClass = d.direction === 'lend' ? 'lend' : 'borrow';
      var directionLabel = d.direction === 'lend' ? '借出' : '借入';
      var statusClass = 'warn';
      if (d.status === '已还清') statusClass = 'success';
      else if (d.status === '逾期') statusClass = 'danger';
      html += '<tr>' +
        '<td><span class="debt-tag ' + directionClass + '">' + directionLabel + '</span></td>' +
        '<td><strong>' + escHtml(d.person_name) + '</strong></td>' +
        '<td><strong style="color:' + (d.direction === 'lend' ? '#2ecc71' : '#e74c3c') + ';">¥' + d.amount + '</strong></td>' +
        '<td>' + d.borrow_date + '</td>' +
        '<td>' + d.due_date + '</td>' +
        '<td><span class="status-badge ' + statusClass + '">' + escHtml(d.status) + '</span></td>' +
        '<td style="font-size:12px;color:#999;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(d.remark || '-') + '</td>' +
        '<td>' +
          '<button class="layui-btn layui-btn-xs layui-btn-normal" onclick="showForm(' + d.id + ')"><i class="fas fa-edit"></i></button> ' +
          '<button class="layui-btn layui-btn-xs layui-btn-danger" onclick="deleteDebt(' + d.id + ',\'' + escHtml(d.person_name) + '\')"><i class="fas fa-trash"></i></button>' +
        '</td></tr>';
    });
    if (res.list.length === 0) {
      html = '<tr><td colspan="8" style="text-align:center;padding:40px 0;color:#ccc;"><i class="fas fa-inbox" style="font-size:36px;display:block;margin-bottom:8px;"></i>暂无数据</td></tr>';
    }
    tbody.innerHTML = html;
    document.getElementById('debtCount').textContent = res.total;
    renderDebtPagination(res);
  });
}

function loadReminders() {
  fetch('/xiaoying_admin/api/finance/debt/reminders/', {credentials: 'same-origin'})
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (!res.ok || !res.reminders.length) return;
    var bar = document.getElementById('reminderBar');
    var items = [];
    res.reminders.forEach(function(r) {
      var icon = r.overdue ? 'fa-exclamation-triangle' : 'fa-bell';
      var color = r.overdue ? '#e74c3c' : '#e67e22';
      var dayText = r.overdue ? '已逾期 ' + Math.abs(r.days_left) + ' 天' : '还剩 ' + r.days_left + ' 天到期';
      items.push('<div style="margin-bottom:4px;"><i class="fas ' + icon + '" style="color:' + color + ';margin-right:6px;"></i>' +
        '<strong>' + escHtml(r.direction_label) + '</strong> ' +
        escHtml(r.person_name) + ' ¥' + r.amount + ' ' +
        '<span style="color:' + color + ';">' + dayText + '</span></div>');
    });
    bar.innerHTML = '<div class="layui-card" style="border-left:3px solid #e67e22;"><div class="layui-card-body" style="padding:10px 14px;">' +
      '<i class="fas fa-bell" style="color:#e67e22;margin-right:6px;"></i> <strong>到期提醒</strong>' +
      items.join('') + '</div></div>';
    bar.style.display = '';
  });
}

function showForm(id) {
  var isEdit = !!id;
  var defaults = {direction: 'lend', person_name: '', amount: '', borrow_date: '', due_date: '', status: '待还', reminder_days: 3, remark: ''};

  if (isEdit) {
    fetch('/xiaoying_admin/api/finance/debt/list/?page=1&page_size=999999', {credentials: 'same-origin'})
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.ok) return;
      var d = res.list.find(function(x) { return x.id === id; });
      if (!d) return;
      defaults = d;
      openFormDialog(isEdit, defaults);
    });
    return;
  }
  openFormDialog(isEdit, defaults);
}

function openFormDialog(isEdit, defaults) {
  var html = [
    '<form class="layui-form" style="padding:18px 20px 10px;">',
    '<input type="hidden" name="id" value="' + (isEdit ? defaults.id : '') + '">',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">方向</label><div class="layui-input-block" style="margin-left:110px;">',
    '<select name="direction">',
    '<option value="lend"' + (defaults.direction==='lend'?' selected':'') + '>借出（别人欠我）</option>',
    '<option value="borrow"' + (defaults.direction==='borrow'?' selected':'') + '>借入（我欠别人）</option>',
    '</select></div></div>',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">对方姓名</label><div class="layui-input-block" style="margin-left:110px;">',
    '<input type="text" name="person_name" class="layui-input" placeholder="请输入姓名" value="' + escHtml(defaults.person_name) + '">',
    '</div></div>',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">金额</label><div class="layui-input-block" style="margin-left:110px;">',
    '<input type="number" step="0.01" name="amount" class="layui-input" placeholder="0.00" value="' + defaults.amount + '">',
    '</div></div>',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">借款日期</label><div class="layui-input-block" style="margin-left:110px;">',
    '<input type="date" name="borrow_date" class="layui-input" value="' + defaults.borrow_date + '">',
    '</div></div>',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">到期日期</label><div class="layui-input-block" style="margin-left:110px;">',
    '<input type="date" name="due_date" class="layui-input" value="' + defaults.due_date + '">',
    '</div></div>',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">状态</label><div class="layui-input-block" style="margin-left:110px;">',
    '<input type="text" name="status" class="layui-input" placeholder="例: 待还/已还清/逾期" value="' + escHtml(defaults.status) + '">',
    '<div style="font-size:11px;color:#999;margin-top:3px;">自定义状态标签，自由填写</div>',
    '</div></div>',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">提前提醒</label><div class="layui-input-block" style="margin-left:110px;">',
    '<input type="number" name="reminder_days" class="layui-input" value="' + defaults.reminder_days + '">',
    '<div style="font-size:11px;color:#999;margin-top:3px;">到期前多少天提醒（天）</div>',
    '</div></div>',

    '<div class="layui-form-item"><label class="layui-form-label" style="width:80px;">备注</label><div class="layui-input-block" style="margin-left:110px;">',
    '<textarea name="remark" class="layui-textarea">' + escHtml(defaults.remark) + '</textarea>',
    '</div></div>',

    '<div class="layui-form-item" style="text-align:center;margin-bottom:0;"><div class="layui-input-block" style="margin-left:0;">',
    '<button type="button" class="layui-btn" onclick="submitForm()"><i class="fas fa-save"></i> ' + (isEdit ? '更新' : '新增') + '</button>',
    '<button type="button" class="layui-btn layui-btn-primary" onclick="layer.closeAll()">取消</button>',
    '</div></div></form>',
  ].join('\n');

  layer.open({
    type: 1,
    title: '<i class="fas fa-hand-holding-usd"></i> ' + (isEdit ? '编辑债务' : '新增债务'),
    area: ['500px', '580px'],
    shadeClose: true,
    shade: 0.3,
    content: html,
    success: function() { layui.use('form', function(f) { f.render(); }); },
  });
}

function submitForm() {
  var form = document.querySelector('.layui-form');
  var data = {};
  ['id','direction','person_name','amount','borrow_date','due_date','status','reminder_days','remark'].forEach(function(k) {
    var el = form.querySelector('[name="' + k + '"]');
    if (el) data[k] = el.value;
  });

  if (!data.person_name) { layer.msg('请输入对方姓名', {icon:2}); return; }
  if (!data.amount) { layer.msg('请输入金额', {icon:2}); return; }

  fetch('/xiaoying_admin/api/finance/debt/save/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
    credentials: 'same-origin',
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.ok) { layer.msg('保存成功', {icon:1}); layer.closeAll(); loadList(); loadReminders(); }
    else { layer.msg(res.error || '保存失败', {icon:2}); }
  })
  .catch(function(e) { layer.msg('请求失败: ' + e, {icon:2}); });
}

function deleteDebt(id, name) {
  layer.confirm('确定删除 <strong>' + escHtml(name) + '</strong> 的债务记录吗？', {
    icon: 3, title: '确认删除', btn: ['删除', '取消'],
  }, function() {
    fetch('/xiaoying_admin/api/finance/debt/delete/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id: id}),
      credentials: 'same-origin',
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) { layer.msg('已删除', {icon:1}); loadList(); loadReminders(); }
      else { layer.msg(res.error || '删除失败', {icon:2}); }
    })
    .catch(function(e) { layer.msg('请求失败', {icon:2}); });
  });
}

/* ─── 分页 ─── */
function renderDebtPagination(res) {
  var bar = document.getElementById('debtPaginationBar');
  var page = res.page, totalPages = res.total_pages, total = res.total;
  if (!total || totalPages <= 1) {
    bar.innerHTML = total ? '<span style="font-size:13px;color:#999;">共 ' + total + ' 条记录</span>' : '';
    return;
  }
  var html = '<div style="display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;">';
  var prevDisabled = page <= 1;
  html += '<button class="layui-btn layui-btn-sm' + (prevDisabled ? ' layui-btn-disabled' : '') + '" ' +
    (prevDisabled ? '' : 'onclick="loadDebtPage(' + (page - 1) + ')"') + '><i class="fas fa-chevron-left"></i></button>';
  var maxVisible = 7;
  var start = Math.max(1, page - Math.floor(maxVisible / 2));
  var end = Math.min(totalPages, start + maxVisible - 1);
  if (end - start + 1 < maxVisible) start = Math.max(1, end - maxVisible + 1);
  if (start > 1) {
    html += '<button class="layui-btn layui-btn-sm" onclick="loadDebtPage(1)">1</button>';
    if (start > 2) html += '<span style="color:#999;padding:0 4px;">…</span>';
  }
  for (var i = start; i <= end; i++) {
    html += '<button class="layui-btn layui-btn-sm' + (i === page ? ' layui-btn-normal' : '') + '" onclick="loadDebtPage(' + i + ')">' + i + '</button>';
  }
  if (end < totalPages) {
    if (end < totalPages - 1) html += '<span style="color:#999;padding:0 4px;">…</span>';
    html += '<button class="layui-btn layui-btn-sm" onclick="loadDebtPage(' + totalPages + ')">' + totalPages + '</button>';
  }
  var nextDisabled = page >= totalPages;
  html += '<button class="layui-btn layui-btn-sm' + (nextDisabled ? ' layui-btn-disabled' : '') + '" ' +
    (nextDisabled ? '' : 'onclick="loadDebtPage(' + (page + 1) + ')"') + '><i class="fas fa-chevron-right"></i></button>';
  html += '<span style="color:#999;margin-left:10px;">共 ' + total + ' 条</span></div>';
  bar.innerHTML = html;
}

function loadDebtPage(page) {
  currentDebtPage = page;
  loadList();
}

function escHtml(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}
</script>
{% endblock %}
